name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck install.sh
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning

      - name: validate JSON templates
        run: |
          for f in skill/templates/*.json; do
            python3 -c "import json,sys; json.load(open('$f'))"
            echo "ok: $f"
          done

      - name: validate YAML templates
        run: |
          python3 -m pip install --quiet pyyaml
          for f in skill/templates/*.yml; do
            python3 -c "import yaml,sys; yaml.safe_load(open('$f'))"
            echo "ok: $f"
          done

      - name: SKILL.md frontmatter present
        run: |
          head -1 skill/SKILL.md | grep -q '^---$'
          grep -q '^name: ' skill/SKILL.md
          grep -q '^description: ' skill/SKILL.md

  smoke-install:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: install claude CLI
        # install.sh delegates MCP registration to `claude mcp add`, which is a
        # local config-file edit and does not require Anthropic credentials.
        run: npm install -g @anthropic-ai/claude-code

      - name: install via local script
        run: |
          mkdir -p /tmp/fakeproject
          cd /tmp/fakeproject
          bash "${GITHUB_WORKSPACE}/install.sh" --project-dir /tmp/fakeproject

      - name: assert artifacts exist
        run: |
          test -f "${HOME}/.claude/skills/serena-mcp-quickstart/SKILL.md"
          test -f "/tmp/fakeproject/.mcp.json"
          test -f "/tmp/fakeproject/.serena/project.yml"
          grep -q '"serena"' /tmp/fakeproject/.mcp.json
          grep -q 'project_name: "fakeproject"' /tmp/fakeproject/.serena/project.yml
          grep -q '^  - typescript$' /tmp/fakeproject/.serena/project.yml

      - name: assert Serena permissions added to settings.json
        run: |
          test -f "${HOME}/.claude/settings.json"
          python3 -c "
          import json
          s = json.load(open('${HOME}/.claude/settings.json'))
          allow = s.get('permissions', {}).get('allow', [])
          serena = [e for e in allow if e.startswith('mcp__serena__')]
          assert len(serena) == 32, f'expected 32 serena entries, got {len(serena)}'
          assert 'mcp__serena__find_symbol' in serena
          assert 'mcp__serena__replace_symbol_body' in serena
          print(f'ok: {len(serena)} mcp__serena__* permissions registered')
          "

      - name: re-run is idempotent
        run: |
          bash "${GITHUB_WORKSPACE}/install.sh" --project-dir /tmp/fakeproject
          # If a second run mutated project.yml, the warn log would show; just re-assert.
          grep -q 'project_name: "fakeproject"' /tmp/fakeproject/.serena/project.yml
          # Permissions list must not double up
          python3 -c "
          import json
          s = json.load(open('${HOME}/.claude/settings.json'))
          allow = s.get('permissions', {}).get('allow', [])
          serena = [e for e in allow if e.startswith('mcp__serena__')]
          assert len(serena) == 32, f'idempotency failed: got {len(serena)} (expected 32)'
          print('ok: idempotent permissions allowlist')
          "

      - name: --no-permissions skips settings.json modification
        run: |
          rm -f "${HOME}/.claude/settings.json"
          mkdir -p /tmp/nopermsproject
          bash "${GITHUB_WORKSPACE}/install.sh" --project-dir /tmp/nopermsproject --no-permissions
          # settings.json must not contain any mcp__serena__ entries (file may not exist)
          if [ -f "${HOME}/.claude/settings.json" ]; then
            ! grep -q "mcp__serena__" "${HOME}/.claude/settings.json"
          fi

      - name: --codex-only does not create Claude artifacts
        run: |
          # Codex CLI is not installed in CI; expect a warn but no Claude artifacts in this dir.
          mkdir -p /tmp/codexproject
          bash "${GITHUB_WORKSPACE}/install.sh" --project-dir /tmp/codexproject --codex-only || true
          test ! -f /tmp/codexproject/.mcp.json
          test -f /tmp/codexproject/.serena/project.yml
          test -f /tmp/codexproject/AGENTS.md
          grep -q "BEGIN serena-mcp-quickstart" /tmp/codexproject/AGENTS.md
