# Serena project configuration — generated by serena-mcp-quickstart
# Adjust the project_name and languages list below to match the repo.
# Canonical enum list: https://github.com/oraios/serena/blob/main/src/solidlsp/ls_config.py

project_name: "__PROJECT_NAME__"

# Languages whose LSP servers should be started on activation.
# Defaults cover the 5-language preset: Java, Vue, TypeScript (JS/React/TSX), Python, HTML.
# CRITICAL: every entry must be a valid Serena enum value.
#   - `js`, `javascript`, `react`, `jsx`, `tsx` → use `typescript` (one entry covers all)
#   - `css` → use `scss` (one entry covers CSS/SCSS/Sass)
#   - `c` → use `cpp`
languages:
  - java
  - vue
  - typescript
  - python
  - html
  # opt-in below (uncomment as needed):
  # - scss        # CSS / SCSS / Sass
  # - go
  # - rust
  # - csharp
  # - kotlin
  # - cpp
  # - ruby
  # - php
  # - swift

encoding: "utf-8"

# Use platform default line endings unless the team standardizes otherwise.
line_ending:

# Honor .gitignore so node_modules / target / .venv are skipped during indexing.
ignore_all_files_in_gitignore: true

# Per-language LSP overrides (rarely needed). Example:
# ls_specific_settings:
#   typescript:
#     preferences:
#       importModuleSpecifierPreference: "non-relative"
ls_specific_settings: {}

# Cross-package symbol search for monorepos (TypeScript only at present).
additional_workspace_folders: []

# Extra paths to ignore beyond .gitignore.
ignored_paths: []

# Read-only mode disables every editing tool. Leave false unless auditing.
read_only: false

excluded_tools: []
included_optional_tools: []
fixed_tools: []

default_modes:
added_modes:

# Prepended to every LLM activation. Keep short — long prompts cost tokens on every call.
initial_prompt: ""

symbol_info_budget:
read_only_memory_patterns: []
ignored_memory_patterns: []
